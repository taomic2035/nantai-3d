name: CI

# Cross-platform enforcement matrix. Guards the Windows-green baseline
# (the class of breaks caused by fcntl-only imports, POSIX symlinks and
# CRLF-sensitive parsing) and HANDOFF-002 cross-platform asset
# reproducibility. Provenance-safe: gates fail closed on any mismatch.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# UTF-8 everywhere so CJK/emoji output never trips cp936/cp1252 on Windows.
env:
  PYTHONUTF8: "1"
  PYTHONIOENCODING: "utf-8"

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.13"]
    # Use bash on every OS (Git Bash ships on GitHub Windows runners) so the
    # step scripts below are identical across the matrix.
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (editable + dev extras)
        if: runner.os != 'Windows'
        run: python -m pip install -e ".[dev]"

      - name: Install (editable + dev and Windows Studio extras)
        if: runner.os == 'Windows'
        run: python -m pip install -e ".[dev,windows-jobs]"

      - name: Test (pytest + node --test)
        # symlink-dependent tests self-skip when the runner lacks the
        # privilege to create symlinks (default on Windows).
        run: python make.py test

      - name: Lint (ruff)
        run: python make.py lint

  reproducibility:
    name: repro-assets (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install (editable + dev extras)
        run: python -m pip install -e ".[dev]"

      - name: Regenerate HANDOFF-002 assets (fresh output dir)
        run: |
          python handoff/deliverables/HANDOFF-002/scripts/generate.py \
            --output out_repro

      - name: Hash the 11 regenerated PLYs
        run: |
          python - <<'PY'
          import glob, hashlib, os
          plys = sorted(glob.glob("out_repro/*.ply"))
          assert len(plys) == 11, f"expected 11 PLYs, got {len(plys)}"
          lines = []
          for p in plys:
              with open(p, "rb") as fh:
                  digest = hashlib.sha256(fh.read()).hexdigest()
              lines.append(f"{digest}  {os.path.basename(p)}")
          text = "\n".join(lines) + "\n"
          with open("plysha.txt", "w", encoding="utf-8", newline="\n") as fh:
              fh.write(text)
          print(text)
          PY

      - name: Validate regenerated assets against committed manifest (fail-closed)
        # Byte-drift from the content-addressed SHA-256 in the committed
        # manifest is a hard failure; never weaken this gate.
        run: |
          cp handoff/deliverables/HANDOFF-002/manifest.json out_repro/manifest.json
          python -m pipeline.validate_handoff out_repro

      - name: Upload per-OS SHA list
        uses: actions/upload-artifact@v4
        with:
          name: plysha-${{ matrix.os }}
          path: plysha.txt

  reproducibility-compare:
    name: repro-compare (ubuntu == windows)
    runs-on: ubuntu-latest
    needs: reproducibility
    defaults:
      run:
        shell: bash
    steps:
      - name: Download all per-OS SHA lists
        uses: actions/download-artifact@v4
        with:
          path: shas

      - name: Assert the 11 PLY SHA-256 are byte-identical across the matrix
        run: |
          ubuntu=shas/plysha-ubuntu-latest/plysha.txt
          windows=shas/plysha-windows-latest/plysha.txt
          echo "== ubuntu =="; cat "$ubuntu"
          echo "== windows =="; cat "$windows"
          if diff -u "$ubuntu" "$windows"; then
            echo "OK: HANDOFF-002 PLY bytes reproduce identically on ubuntu and windows"
          else
            echo "FAIL: cross-platform PLY byte drift detected" >&2
            exit 1
          fi
